<!DOCTYPE html>
<html lang="en" ng-app="diaryApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Daily Diary - Secure Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="papaparse.min.js"></script>
    <script src="angular.min.js"></script>
</head>
<body class="bg-light" ng-controller="DiaryController">

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                
                <div class="card shadow border-0" ng-if="!isLoggedIn">
                    <div class="card-header bg-dark text-white text-center py-4">
                        <h4 class="mb-0">🔒 Teacher's Secure Portal</h4>
                        <small class="text-muted">Log in to record your daily diary</small>
                    </div>
                    <div class="card-body p-4">
                        <form ng-submit="login()">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Select Teacher Name</label>
                                <input class="form-control" list="teachersList" ng-model="loginData.teacherName" placeholder="Type to search your name..." required>
                                <datalist id="teachersList">
                                    <option ng-repeat="(name, pin) in teacherRegistry" value="{{name}}"></option>
                                </datalist>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Security PIN</label>
                                <input type="password" class="form-control text-center fs-4" ng-model="loginData.pin" placeholder="••••" maxlength="10" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-dark btn-lg">Log In & Unlock Form</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow border-0" ng-if="isLoggedIn">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
                        <h4 class="mb-0">Daily Diary Submission</h4>
                        <button class="btn btn-sm btn-outline-light" ng-click="logout()">🔒 Lock / Logout</button>
                    </div>
                    <div class="card-body p-4">
                        <div class="alert alert-light border mb-4">Welcome back, <strong>{{ diaryEntry.teacherName }}</strong>!</div>
                        <form ng-submit="submitDiary()">
                            <div class="row mb-3">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Subject</label>
                                    <input type="text" class="form-control" ng-model="diaryEntry.subject" placeholder="e.g., Physics" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Date</label>
                                    <input type="date" class="form-control" ng-model="diaryEntry.date" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Attendance Status</label>
                                <div class="d-flex gap-3 flex-wrap">
                                    <div class="form-check"><input class="form-check-input" type="radio" id="p" value="Present" ng-model="diaryEntry.status"><label class="form-check-label" for="p">Present</label></div>
                                    <div class="form-check"><input class="form-check-input" type="radio" id="a" value="Absent" ng-model="diaryEntry.status"><label class="form-check-label" for="a">Absent</label></div>
                                    <div class="form-check"><input class="form-check-input" type="radio" id="h" value="Half Day" ng-model="diaryEntry.status"><label class="form-check-label" for="h">Half Day</label></div>
                                    <div class="form-check"><input class="form-check-input" type="radio" id="s" value="Sick Leave" ng-model="diaryEntry.status"><label class="form-check-label" for="s">Sick Leave</label></div>
                                </div>
                            </div>
                            <hr>

                            <div ng-if="diaryEntry.status !== 'Absent' && diaryEntry.status !== 'Sick Leave'">
                                <h5 class="mb-3 text-secondary">Today's Lectures</h5>
                                <div class="card border-primary-subtle mb-3 bg-white shadow-sm" ng-repeat="lecture in diaryEntry.lectures">
                                    <div class="card-body">
                                        <span class="badge bg-primary mb-3">Lecture {{lecture.number}}</span>
                                        <div class="mb-3">
                                            <label class="form-label small fw-bold">Class / Section</label>
                                            <input type="text" class="form-control" placeholder="e.g., Grade 10-A" ng-model="lecture.classSection" required>
                                        </div>
                                        <div class="mb-2">
                                            <label class="form-label small fw-bold">Topics Covered</label>
                                            <textarea class="form-control" rows="2" placeholder="What did you teach?" ng-model="lecture.topics" required></textarea>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4 mt-3">
                                <label class="form-label fw-bold">Remarks / General Notes</label>
                                <textarea class="form-control" rows="2" placeholder="Any special notes?" ng-model="diaryEntry.remarks"></textarea>
                            </div>
                            <div class="d-grid"><button type="submit" class="btn btn-primary btn-lg">Submit Today's Diary</button></div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
